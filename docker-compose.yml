services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: hire_wire
      POSTGRES_USER: hire_wire
      POSTGRES_PASSWORD: hire_wire_secret
    # Dados no disco do host (pasta na raiz do repositório). Persiste entre `docker compose down`
    # e não é apagado por `docker compose down -v` (esse comando remove volumes nomeados no Compose,
    # não esta pasta). Está listada no `.gitignore`.
    volumes:
      - ./docker-data/postgres:/var/lib/postgresql/data
    # Host:container — use localhost:5433 no DBeaver/psql no Windows se 5432 já estiver ocupado.
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hire_wire -d hire_wire"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    ports:
      - "8000:8000"
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: "5432"
      DB_DATABASE: hire_wire
      DB_USERNAME: hire_wire
      DB_PASSWORD: hire_wire_secret
    depends_on:
      db:
        condition: service_healthy
    command: php artisan serve --host=0.0.0.0 --port=8000
